name: Build Android TV APK

on:
  workflow_dispatch: # 手动触发

# 全局环境变量，解决内存溢出、Node 版本警告及 Gradle 编译性能
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

permissions:
  contents: write

jobs:
  tv_build:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 获取版本号
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 5. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 6. 生成原生 TV 项目 (Prebuild)
        # Expo 会根据 app.json 中的 @react-native-tvos/config-tv 插件配置 TV 专属属性
        run: npx expo prebuild --platform android --no-install

      - name: 7. 恢复签名文件
        # 电视版必须签名，否则大部分电视系统（如索尼、小米）会拦截安装
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 8. 执行 TV 版正式编译
        run: |
          cd android
          chmod +x gradlew
          
          # 核心修复：显式指定入口文件，解决 Metro 报错找不到 index.js
          # 根据你之前的报错，这里设为标准 Expo 入口
          export ENTRY_FILE=node_modules/expo/AppEntry.js
          
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 9. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          # 复制正式版输出
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/SuperTV_TV.${{ steps.package-version.outputs.version }}.apk

      - name: 10. 创建 GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.package-version.outputs.version }}-tv"
          name: "SuperTV TV Release v${{ steps.package-version.outputs.version }}"
          body: |
            ## SuperTV 安卓电视正式版
            - 适配：Android TV / 电视盒子 / 投影仪
            - 版本：${{ steps.package-version.outputs.version }}
            - 包含：电视专属 Banner 图、正式签名、混淆优化
          draft: false
          prerelease: false
          files: "artifacts/SuperTV_TV.${{ steps.package-version.outputs.version }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
