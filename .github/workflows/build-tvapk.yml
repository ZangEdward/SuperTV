name: Build TV + Mobile APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # -------------------------
      # 📱 MOBILE 版本构建
      # -------------------------
      - name: Prepare Mobile app.json
        run: |
          echo "Generating Mobile app.json..."
          cp app.json app.mobile.json
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.mobile.json','utf8'));
          app.expo.android.tv = false;
          app.expo.android.package = 'com.oriontv';
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: Prebuild Mobile
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: Disable ABI splits (Mobile)
        run: |
          sed -i '/defaultConfig {/a\
        splits { abi { enable false } }' android/app/build.gradle

      - name: Restore signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/release-key.jks

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: Build Mobile APK (signed)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.signing.store.file=release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Save Mobile APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Mobile.apk

      # -------------------------
      # 📺 TV 版本构建
      # -------------------------
      - name: Prepare TV app.json
        run: |
          echo "Generating TV app.json..."
          cp app.mobile.json app.json
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json','utf8'));
          app.expo.android.tv = true;
          app.expo.android.package = 'com.oriontv.tv';
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: Prebuild TV
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: Disable ABI splits (TV)
        run: |
          sed -i '/defaultConfig {/a\
        splits { abi { enable false } }' android/app/build.gradle

      - name: Restore signing key (TV)
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/release-key.jks

      - name: Build TV APK (signed)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.signing.store.file=release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Save TV APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_TV.apk

      # -------------------------
      # 📦 上传两个 APK
      # -------------------------
      - name: Upload Both APKs
        uses: actions/upload-artifact@v4
        with:
          name: SuperTV-APK-Bundle
          path: artifacts/*.apk