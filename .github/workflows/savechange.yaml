name: Sync Changes Only

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔢 Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 📅 Get date code
        id: date_code
        run: |
          DATE_CODE=$(date +'%Y%m%d')
          echo "DATE_CODE=$DATE_CODE" >> $GITHUB_ENV

      - name: 📝 Generate change log
        run: |
          mkdir -p output
          FILE="output/changes-v${{ env.VERSION }}-${{ env.DATE_CODE }}.txt"

          echo "SuperTV 更新内容" > $FILE
          echo "版本: v${{ env.VERSION }}" >> $FILE
          echo "日期: ${{ env.DATE_CODE }}" >> $FILE
          echo "" >> $FILE

          echo "📌 Commit 信息：" >> $FILE
          git log -1 --pretty=format:"%h %s" >> $FILE
          echo "" >> $FILE

          echo "📁 变动文件：" >> $FILE
          git diff --name-only HEAD~1 HEAD >> $FILE
          echo "" >> $FILE

          echo "🔍 Diff 内容：" >> $FILE
          git diff HEAD~1 HEAD >> $FILE

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: SuperTV-v${{ env.VERSION }}-${{ env.DATE_CODE }}
          name: "SuperTV 更新 v${{ env.VERSION }} (${{ env.DATE_CODE }})"
          files: output/changes-v${{ env.VERSION }}-${{ env.DATE_CODE }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📁 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: changes-v${{ env.VERSION }}-${{ env.DATE_CODE }}
          path: output/changes-v${{ env.VERSION }}-${{ env.DATE_CODE }}.txt
