name: Build Android TV Debug

on:
  workflow_dispatch:

env:
  # 针对电视版和 Expo Router 的必要环境变量
  EXPO_TV: 1
  EXPO_USE_METRO_WORKSPACE_ROOT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 禁用并行编译，确保 C++ (expo-av) 和 JS 打包过程稳定
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 设置 Java & NDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 5. 设置 NDK 26
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 5.5 强制修正 Babel 配置 (双重保险)
        # 防止 babel.config.js 中残留过时的 expo-router/babel 导致打包中断
        run: |
          if [ -f "babel.config.js" ]; then
            sed -i "s/'expo-router\/babel'//g" babel.config.js
            sed -i 's/"
