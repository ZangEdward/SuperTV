name: Build Debug APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 禁用并行编译，防止 C++ 链接时的资源竞争导致莫名其妙的报错
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 获取版本号
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 5. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 6. 设置 Android NDK
        uses: android-actions/setup-android@v3
        with:
          # NDK 26 是 Expo SDK 51 的官方推荐版本
          packages: "ndk;26.1.10909125"

      - name: 7. 注入 CXX1210 终极补丁
        # 这是解决 [CXX1210] No compatible library found 的核心操作
        # 强制 CMake 在 Debug 编译时使用 Release 版本的底层库
        run: |
          echo "Applying CXX1210 Fallback Patch..."
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // 修复 expo-av 的 CMake 配置
          const avCmake = 'node_modules/expo-av/android/CMakeLists.txt';
          if (fs.existsSync(avCmake)) {
            let content = fs.readFileSync(avCmake, 'utf8');
            if (!content.includes('CMAKE_MAP_IMPORTED_CONFIG_DEBUG')) {
              fs.writeFileSync(avCmake, 'set(CMAKE_MAP_IMPORTED_CONFIG_DEBUG Release)\n' + content);
              console.log('✅ expo-av patched');
            }
          }

          // 修复 expo-modules-core 的 CMake 配置（防止连锁反应）
          const coreCmake = 'node_modules/expo-modules-core/android/CMakeLists.txt';
          if (fs.existsSync(coreCmake)) {
            let content = fs.readFileSync(coreCmake, 'utf8');
            if (!content.includes('CMAKE_MAP_IMPORTED_CONFIG_DEBUG')) {
              fs.writeFileSync(coreCmake, 'set(CMAKE_MAP_IMPORTED_CONFIG_DEBUG Release)\n' + content);
              console.log('✅ expo-modules-core patched');
            }
          }
          "

      - name: 8. 执行 Prebuild (生成 Android 目录)
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: 9. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 10. 执行编译
        run: |
          cd android
          chmod +x gradlew
          
          # 明确路径，防止构建系统“迷路”
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          
          # 编译双架构，确保兼容新旧电视盒子
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -PreactNativeArchitectures=armeabi-v7a,arm64-v8a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 11. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug_v${{ steps.package-version.outputs.version }}.apk

      - name: 12. 发布 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.package-version.outputs.version }}-debug-${{ github.run_number }}"
          name: "SuperTV Debug v${{ steps.package-version.outputs.version }}"
          body: |
            ### 构建信息
            - **版本**: ${{ steps.package-version.outputs.version }}
            - **架构**: armeabi-v7a, arm64-v8a
            - **修复**: 强制 CMake 映射 Debug 库到 Release (解决 CXX1210 错误)
          files: "artifacts/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
