name: Build Android TV Debug

on:
  workflow_dispatch:

env:
  EXPO_TV: 1
  EXPO_USE_METRO_WORKSPACE_ROOT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 强制单线程编译 C++ 部分，防止资源争抢导致库搜索失败
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.configureondemand=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 获取版本号
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 5. 设置 Java & NDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 6. 设置特定版本的 NDK (26.1.10909125)
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 7. 强制修正 Babel 配置
        run: |
          node -e "
          const fs = require('fs');
          const path = 'babel.config.js';
          if (fs.existsSync(path)) {
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace(/'expo-router\/babel'/g, '').replace(/\"expo-router\/babel\"/g, '');
            content = content.replace(/,(\s*),/g, ',');
            fs.writeFileSync(path, content);
          }
          "

      - name: 8. 执行预构建 (清理并重新生成)
        # 彻底移除可能存在的 android 目录缓存
        run: |
          rm -rf android
          yarn prebuild

      - name: 9. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 10. 执行编译 (注入 Prefab 和 NDK 修复参数)
        run: |
          cd android
          chmod +x gradlew
          
          # 显式导出 NDK 路径给 CMake 使用
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export ENTRY_FILE=node_modules/expo-router/entry.js
          
          # 注入关键参数：
          # 1. 显式指定 ndkVersion
          # 2. 启用 prefab (这是解决 CXX1210 的核心)
          # 3. 限制架构为 arm64-v8a
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -Pandroid.prefab=true \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 11. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug_v${{ steps.package-version.outputs.version }}.apk

      - name: 12. 创建 GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.package-version.outputs.version }}-debug-${{ github.run_number }}"
          name: "SuperTV Debug v${{ github.run_number }}"
          files: "artifacts/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
