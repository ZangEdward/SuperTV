name: Build Android TV Debug

on:
  workflow_dispatch:

env:
  EXPO_TV: 1
  EXPO_USE_METRO_WORKSPACE_ROOT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 强制关闭并行编译，确保 C++ 链接时不会因为资源竞争而找不到库
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.configureondemand=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 5. 设置 NDK 26.1.10909125
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 6. 超级补丁 (修复 Babel & expo-av 深度链接)
        # 这一步是解决 CXX1210 的核心：同时修正 CMake 和 build.gradle
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          // --- 1. 修复 Babel ---
          const babelPath = 'babel.config.js';
          if (fs.existsSync(babelPath)) {
            let content = fs.readFileSync(babelPath, 'utf8');
            content = content.replace(/'expo-router\/babel'/g, '').replace(/\"expo-router\/babel\"/g, '').replace(/,(\s*),/g, ',');
            fs.writeFileSync(babelPath, content);
            console.log('✅ Babel fixed.');
          }

          // --- 2. 修复 expo-av CMakeLists.txt ---
          const cmakePath = 'node_modules/expo-av/android/CMakeLists.txt';
          if (fs.existsSync(cmakePath)) {
            let content = fs.readFileSync(cmakePath, 'utf8');
            // 彻底移除 REQUIRED 约束，防止找不到 ReactAndroid 时崩溃
            content = content.replace(/find_package\(ReactAndroid REQUIRED\)/g, 'find_package(ReactAndroid)');
            content = content.replace(/find_package\(fbjni REQUIRED\)/g, 'find_package(fbjni)');
            fs.writeFileSync(cmakePath, content);
            console.log('✅ expo-av CMake patched.');
          }

          // --- 3. 修复 expo-av build.gradle (新增步骤) ---
          const avGradlePath = 'node_modules/expo-av/android/build.gradle';
          if (fs.existsSync(avGradlePath)) {
            let content = fs.readFileSync(avGradlePath, 'utf8');
            // 在 android 块中强制注入 prefab true
            if (!content.includes('prefab true')) {
              content = content.replace('android {', 'android {\n    buildFeatures { prefab true }');
            }
            fs.writeFileSync(avGradlePath, content);
            console.log('✅ expo-av build.gradle patched with Prefab support.');
          }
          "

      - name: 7. 执行预构建 (yarn prebuild)
        # 必须先删除旧的 android 目录，确保 patch 后的配置能应用到生成的工程中
        run: |
          rm -rf android
          yarn prebuild

      - name: 8. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 9. 执行 Debug 编译
        run: |
          cd android
          chmod +x gradlew
          
          # 关键环境变量
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export ENTRY_FILE=node_modules/expo-router/entry.js
          
          # 增加 -Pandroid.prefab=true 以确保全局启用
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -Pandroid.prefab=true \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 10. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug.apk

      - name: 11. 发布 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.13-debug-${{ github.run_number }}"
          name: "SuperTV Debug v1.3.13"
          files: "artifacts/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
