name: Build Debug APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false" # 禁用并行编译，防止 C++ 编译冲突

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 获取版本号
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 5. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 6. 设置 Android NDK
        uses: android-actions/setup-android@v3
        with:
          # NDK 26.1.10909125 是目前对 expo-av 兼容性最好的版本
          packages: "ndk;26.1.10909125"

      - name: 7. 生成原生项目 (Prebuild)
        # 强制清除旧的 android 目录再重新生成，防止旧的 CMake 缓存导致 [CXX1210] 错误
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: 8. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 9. 执行 Debug 编译
        run: |
          cd android
          chmod +x gradlew
          
          # 设置入口文件路径
          export ENTRY_FILE=node_modules/expo/AppEntry.js
          
          # 【核心修复参数】
          # 1. 显式锁定 NDK 版本
          # 2. 仅编译 arm64-v8a (减少 CMake 库搜索范围)
          # 3. 注入签名信息
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 10. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug.${{ steps.package-version.outputs.version }}.apk

      - name: 11. 创建 GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.package-version.outputs.version }}-debug"
          name: "Debug Release v${{ steps.package-version.outputs.version }}"
          body: "SuperTV 修复 C++ 库匹配问题的测试版"
          draft: false
          prerelease: true
          files: "artifacts/SuperTV_Debug.${{ steps.package-version.outputs.version }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
