name: Build Debug APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 强制关闭并行编译和守护进程，确保 C++ 链接顺序正确
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 获取版本号
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 5. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 6. 设置特定版本的 NDK
        # 很多时候 26.x 太新导致旧版 expo-av 崩溃，改用稳定版 25.1.8937393
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;25.1.8937393"

      - name: 7. 生成原生项目 (Prebuild)
        # 强制清理并重新生成，这是解决 CXX1210 的关键
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: 8. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 9. 执行 Debug 编译
        run: |
          cd android
          chmod +x gradlew
          
          # 显式指定入口文件
          export ENTRY_FILE=node_modules/expo/AppEntry.js
          
          # 核心修复参数：
          # 1. 锁定 NDK 到 25.x
          # 2. 禁用 New Architecture (如果你的项目不需要)
          # 3. 强制开启 Prefab
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=25.1.8937393 \
            -Pandroid.prefab=true \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 10. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug.${{ steps.package-version.outputs.version }}.apk

      - name: 11. 创建 GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.package-version.outputs.version }}-debug"
          name: "Debug Release v${{ steps.package-version.outputs.version }}"
          body: "已强制开启 Prefab 且锁定 NDK 25 的修复版"
          draft: false
          prerelease: true
          files: "artifacts/SuperTV_Debug.${{ steps.package-version.outputs.version }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
