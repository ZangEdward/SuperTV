name: Build Android TV Official

on:
  workflow_dispatch:

env:
  # 官方脚本要求的环境变量
  EXPO_TV: 1
  EXPO_USE_METRO_WORKSPACE_ROOT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 禁用并行以确保 expo-av 编译 C++ 时的稳定性
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

permissions:
  contents: write

jobs:
  build_tv:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 5. 设置 Android NDK
        # react-native-tvos 0.74 需要较新的 NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 6. 执行预构建 (完全对应你的 package.json)
        # 这会自动运行 expo prebuild --clean 和 yarn copy-config
        run: yarn prebuild

      - name: 7. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 8. 执行正式编译
        run: |
          cd android
          chmod +x gradlew
          
          # 核心修复点：
          # 1. 指向 NDK 路径解决 expo-av 报错
          # 2. 根据你的 package.json "main" 设置正确的入口文件
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export ENTRY_FILE=node_modules/expo-router/entry.js
          
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            -PreactNativeArchitectures=arm64-v8a

      - name: 9. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/SuperTV_TV_v${{ github.run_number }}.apk

      - name: 10. 创建 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.13-build-${{ github.run_number }}"
          name: "SuperTV TV Release 1.3.13"
          body: |
            ## SuperTV Android TV 正式版
            - 版本：1.3.13
            - 引擎：react-native-tvos 0.74.2
            - 修复：expo-av C++ 编译环境已补全
          files: "artifacts/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
