name: Build Android TV Debug

on:
  workflow_dispatch:

env:
  EXPO_TV: 1
  EXPO_USE_METRO_WORKSPACE_ROOT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 彻底关闭守护进程和并行，确保纯净编译
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 5. 设置 NDK 26 (Expo SDK 51 标准)
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 6. 修复 Babel 插件冲突
        # 仅保留 Babel 修复，因为这是真实存在的 SDK 51 语法冲突
        run: |
          node -e "
          const fs = require('fs');
          const babelPath = 'babel.config.js';
          if (fs.existsSync(babelPath)) {
            let content = fs.readFileSync(babelPath, 'utf8');
            content = content.replace(/'expo-router\/babel'/g, '').replace(/\"expo-router\/babel\"/g, '').replace(/,(\s*),/g, ',');
            fs.writeFileSync(babelPath, content);
            console.log('✅ Babel fixed.');
          }
          "

      - name: 7. 执行预构建 (清理并重建)
        run: |
          rm -rf android
          yarn prebuild

      - name: 8. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 9. 执行 Debug 编译 (切换为 32 位电视架构)
        run: |
          cd android
          chmod +x gradlew
          
          # 核心路径引导
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export ENTRY_FILE=node_modules/expo-router/entry.js
          
          # 显式告诉 CMake 去哪里找 React Native
          export REACT_NATIVE_DIR=$GITHUB_WORKSPACE/node_modules/react-native
          
          # 【核心修复】：将 reactNativeArchitectures 改为 armeabi-v7a
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -PreactNativeArchitectures=armeabi-v7a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 10. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug.apk

      - name: 11. 发布 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.13-debug-${{ github.run_number }}"
          name: "SuperTV Debug v1.3.13"
          body: |
            ### 构建详情
            - 架构：`armeabi-v7a` (专门适配 Android TV OS)
            - 引擎：react-native-tvos
          files: "artifacts/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
