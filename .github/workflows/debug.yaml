name: Build Android TV Debug

on:
  workflow_dispatch:

env:
  EXPO_TV: 1
  EXPO_USE_METRO_WORKSPACE_ROOT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  # 彻底禁用并行和配置按需加载，防止 C++ 链接时丢失 Prefab 路径
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.configureondemand=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 5. 设置 NDK 26.1.10909125
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 6. 自动化环境修补 (Babel & expo-av CMake)
        # 针对 SDK 51 和 TVOS 分支的专属补丁
        run: |
          node -e "
          const fs = require('fs');
          
          // 1. 修复 Babel 插件冲突
          const babelPath = 'babel.config.js';
          if (fs.existsSync(babelPath)) {
            let content = fs.readFileSync(babelPath, 'utf8');
            content = content.replace(/'expo-router\/babel'/g, '').replace(/\"expo-router\/babel\"/g, '').replace(/,(\s*),/g, ',');
            fs.writeFileSync(babelPath, content);
            console.log('✅ Babel fixed.');
          }

          // 2. 修复 expo-av [CXX1210] 报错 (针对 react-native-tvos 的核心补丁)
          const cmakePath = 'node_modules/expo-av/android/CMakeLists.txt';
          if (fs.existsSync(cmakePath)) {
            let content = fs.readFileSync(cmakePath, 'utf8');
            // 移除对 ReactAndroid 包的强制依赖检查，改用 Prefab 自动链接
            content = content.replace('find_package(ReactAndroid REQUIRED)', 'find_package(ReactAndroid)');
            fs.writeFileSync(cmakePath, content);
            console.log('✅ expo-av CMake patched.');
          }
          "

      - name: 7. 执行预构建 (yarn prebuild)
        # 会自动清理 android 目录并运行 copy-config (如 package.json 所定义)
        run: yarn prebuild

      - name: 8. 恢复签名文件
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 9. 执行 Debug 编译
        run: |
          cd android
          chmod +x gradlew
          
          # 核心路径变量
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export ENTRY_FILE=node_modules/expo-router/entry.js
          
          # 编译参数说明：
          # -Pandroid.prefab=true: 启用 Prefab 依赖发现机制 (解决 C++ 库找不到的关键)
          # -PreactNativeArchitectures=arm64-v8a: 仅编译主流 64 位电视架构，减少出错率
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -Pandroid.prefab=true \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 10. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_v${VERSION}_Debug.apk

      - name: 11. 发布 GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.3.13-debug-${{ github.run_number }}"
          name: "SuperTV Debug v1.3.13 (Build ${{ github.run_number }})"
          body: |
            ### 构建详情
            - **App 名称**: SuperTV
            - **包名**: com.oriontv
            - **引擎**: react-native-tvos (Expo SDK 51)
            - **修复**: 已应用 expo-av C++ 链接补丁
          files: "artifacts/*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
