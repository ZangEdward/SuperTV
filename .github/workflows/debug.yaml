name: Build Debug APK

on:
  workflow_dispatch: # 手动触发编译

# 全局环境变量，解决内存溢出和 Node.js 版本警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

permissions:
  contents: write

jobs:
  debug_build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: 3. 安装依赖
        run: yarn install --frozen-lockfile

      - name: 4. 获取版本号
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 5. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 6. 生成原生项目 (Prebuild)
        # 根据 app.json 生成 android 目录，跳过依赖安装
        run: npx expo prebuild --platform android --no-install

      - name: 7. 恢复签名文件
        # 从 Secret 恢复 JKS 签名，确保编译通过
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: 8. 执行 Debug 编译
        run: |
          cd android
          chmod +x gradlew
          
          # 【核心修复】显式指定 Expo 入口文件。
          # 如果报错找不到 index.js，请尝试修改为 node_modules/expo-router/entry.js
          export ENTRY_FILE=node_modules/expo/AppEntry.js
          
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 9. 整理产物
        if: success()
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug.${{ steps.package-version.outputs.version }}.apk

      - name: 10. 创建 GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.package-version.outputs.version }}-debug"
          name: "Debug Release v${{ steps.package-version.outputs.version }}"
          body: |
            ## SuperTV Debug 测试版
            - 状态：测试版 (Debug)
            - 版本：${{ steps.package-version.outputs.version }}
            - 基于项目：OrionTV
            - 编译时间：${{ github.event.repository.updated_at }}
          draft: false
          prerelease: true
          files: "artifacts/SuperTV_Debug.${{ steps.package-version.outputs.version }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
