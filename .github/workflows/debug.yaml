name: Build Debug APK

on:
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  _JAVA_OPTIONS: "-Xmx4g"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

permissions:
  contents: write

jobs:
  debug_build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: 3. Install deps
        run: yarn install --frozen-lockfile

      - name: 4. Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: 5. Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: 6. Prebuild
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      - name: 7. Patch CXX1210 (node_modules + .cxx)
        run: |
          echo "Patching expo-av CMakeLists..."
          node -e "
          const fs = require('fs');
          const glob = require('glob');

          const patch = 'set(CMAKE_MAP_IMPORTED_CONFIG_DEBUG Release)\\n';

          // patch node_modules
          const nm = 'node_modules/expo-av/android/CMakeLists.txt';
          if (fs.existsSync(nm)) {
            let c = fs.readFileSync(nm, 'utf8');
            if (!c.includes('CMAKE_MAP_IMPORTED_CONFIG_DEBUG')) {
              fs.writeFileSync(nm, patch + c);
              console.log('patched node_modules expo-av');
            }
          }

          // patch android/.cxx (真正参与编译)
          const files = glob.sync('android/.cxx/**/expo-av/CMakeLists.txt');
          for (const f of files) {
            let c = fs.readFileSync(f, 'utf8');
            if (!c.includes('CMAKE_MAP_IMPORTED_CONFIG_DEBUG')) {
              fs.writeFileSync(f, patch + c);
              console.log('patched .cxx expo-av:', f);
            }
          }
          "

      - name: 8. Build Debug
        run: |
          cd android
          chmod +x gradlew
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.ndkVersion=26.1.10909125 \
            -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: 9. Collect APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SuperTV_Debug.apk

      - name: 10. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "debug-${{ github.run_number }}"
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}