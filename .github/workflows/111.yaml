name: Generate Secrets Temporary File

on:
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行

jobs:
  create-file:
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate JSON File
        env:
          API_NODES_JSON: ${{ secrets.API_NODES_JSON }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PAT: ${{ secrets.PAT }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
          SYNC_REPO: ${{ secrets.SYNC_REPO }}
        run: |
          # 创建一个安全的临时目录
          mkdir -p secrets_download
          
          # 使用 jq 将所有变量安全地写入一个 JSON 文件中
          jq -n \
            --arg api_nodes "$API_NODES_JSON" \
            --arg key_alias "$KEY_ALIAS" \
            --arg key_pass "$KEY_PASSWORD" \
            --arg pat "$PAT" \
            --arg signing_key "$SIGNING_KEY" \
            --arg src_repo "$SOURCE_REPO" \
            --arg sync_repo "$SYNC_REPO" \
            '{
              api_nodes_json: $api_nodes,
              key_alias: $key_alias,
              key_password: $key_pass,
              pat: $pat,
              signing_key: $signing_key,
              source_repo: $src_repo,
              sync_repo: $sync_repo
            }' > secrets_download/secrets_backup.json

      - name: Upload Temporary File
        uses: actions/upload-artifact@v4
        with:
          name: repository-secrets-file  # 下载时的压缩包名称
          path: secrets_download/        # 需要打包下载的文件夹路径
          retention-days: 1              # 临时文件保留天数（1天后自动销毁，确保安全）
