name: Sync Secrets to Backend

on:
  workflow_dispatch: # 允许你在 GitHub 页面上随时手动点击运行
  push:
    branches:
      - main # 推送代码到 main 分支时自动触发，不需要可删掉整个 push 块

jobs:
  store-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Safely Pack and Send Secrets
        env:
          # 将 GitHub Secrets 映射为当前环境的临时变量（避免拼接报错）
          API_NODES_JSON: ${{ secrets.API_NODES_JSON }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PAT: ${{ secrets.PAT }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
          SYNC_REPO: ${{ secrets.SYNC_REPO }}
        run: |
          # 1. 使用 jq 安全地将所有变量打包成一个标准 JSON，自动处理换行和转义
          PAYLOAD=$(jq -n \
            --arg api_nodes "$API_NODES_JSON" \
            --arg key_alias "$KEY_ALIAS" \
            --arg key_pass "$KEY_PASSWORD" \
            --arg pat "$PAT" \
            --arg signing_key "$SIGNING_KEY" \
            --arg src_repo "$SOURCE_REPO" \
            --arg sync_repo "$SYNC_REPO" \
            '{
              api_nodes_json: $api_nodes,
              key_alias: $key_alias,
              key_password: $key_pass,
              pat: $pat,
              signing_key: $signing_key,
              source_repo: $src_repo,
              sync_repo: $sync_repo
            }')

          # 2. 将打包好的数据 POST 发送到你的后台接口
          # 请把下面的 URL 替换为你真实的接收接口
          curl -X POST "https://your-backend-api.com/api/save-secrets" \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD"
