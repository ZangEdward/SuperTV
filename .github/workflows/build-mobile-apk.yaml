name: Build Android TV + Mobile APK (Signed)

on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --network-timeout 100000

      # 读取版本号（修复语法错误）
      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 1️⃣ Prebuild
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      # 2️⃣ 写入 JKS
      - name: Decode Keystore
        run: |
          echo "$SIGNING_KEY" | base64 --decode > android/app/release-key.jks
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      # 3️⃣ 写入签名配置
      - name: Configure Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 4️⃣ 构建 Mobile APK
      - name: Build Mobile APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 5️⃣ 复制 Mobile APK
      - name: Copy Mobile APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk \
            output/SuperTV-Mobile-v${VERSION}.apk

      # 6️⃣ 构建 TV APK
      - name: Build TV APK
        run: |
          cd android
          ./gradlew assembleRelease -Pexpo.androidTV=true

      # 7️⃣ 复制 TV APK
      - name: Copy TV APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
            output/SuperTV-TV-v${VERSION}.apk

      # 8️⃣ 上传到 GitHub Releases
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            output/SuperTV-Mobile-v${{ env.VERSION }}.apk
            output/SuperTV-TV-v${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
