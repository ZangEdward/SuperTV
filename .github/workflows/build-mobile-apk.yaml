name: Build Mobile Release (Debug JS Error)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prebuild
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      # ⭐ 关键：让 Expo 能读到 NODE_ENV
      - name: Force NODE_ENV in gradle.properties
        run: |
          echo "NODE_ENV=production" >> android/gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      # ⭐⭐ 最关键：打印 JS bundle 的真实错误
      - name: Build Release APK (with JS error logs)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Upload logs
        if: failure()
        run: |
          echo "Build failed. Uploading logs..."
        # 这里不上传文件，只是占位