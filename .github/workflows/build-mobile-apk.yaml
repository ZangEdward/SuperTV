name: Build Mobile Release (Debug JS Bundle)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prebuild
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      # ⭐ 强制禁用 Hermes（TV 必须）
      - name: Force disable Hermes
        run: |
          echo "hermesEnabled=false" >> android/gradle.properties
          echo "expo.jsEngine=jsc" >> android/gradle.properties

      # ⭐ 让 Node 打印所有 JS bundler 错误
      - name: Inject Node debug flags
        run: |
          echo "NODE_OPTIONS=--trace-uncaught --trace-warnings" >> android/gradle.properties
          echo "BUNDLE_COMMAND=bundle" >> android/gradle.properties
          echo "CLI_PATH=node_modules/react-native/cli.js" >> android/gradle.properties
          echo "RCT_METRO_PORT=8081" >> android/gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      - name: Build Release APK (print JS errors)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
