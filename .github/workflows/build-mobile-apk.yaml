name: Build Mobile Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: yarn install --frozen-lockfile

      - name: Read version
        id: pkg
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -------------------------
      # 🔧 设置 Release 所需环境变量（关键）
      # -------------------------
      - name: Set NODE_ENV
        run: echo "NODE_ENV=production" >> $GITHUB_ENV

      # -------------------------
      # 🔧 Prebuild（只执行一次）
      # -------------------------
      - run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      # -------------------------
      # 🔧 写入签名文件
      # -------------------------
      - name: Decode signing key
        run: |
          echo "$SIGNING_KEY" | base64 --decode > android/app/release-key.jks
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Create signing config
        run: |
          cat >> android/app/build.gradle << 'EOF'

android {
    signingConfigs {
        release {
            storeFile file("release-key.jks")
            storePassword System.getenv("KEY_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}
EOF

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: "ndk;26.1.10909125"

      # -------------------------
      # 📦 构建 Release APK（包含 JS bundle）
      # -------------------------
      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # -------------------------
      # 📦 上传 APK
      # -------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperTV-Mobile-Release-v${{ steps.pkg.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk