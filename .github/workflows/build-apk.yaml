name: Build and Release APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🧹 Clear Metro cache
        run: rm -rf node_modules/.cache/metro

      - name: 🔢 Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 🛠️ Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_TV: 1

      - name: 🏗️ Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📁 Prepare Artifact
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/SuperTV-v${{ env.VERSION }}.apk

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: output/SuperTV-v${{ env.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📁 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperTV-v${{ env.VERSION }}
          path: output/SuperTV-v${{ env.VERSION }}.apk
