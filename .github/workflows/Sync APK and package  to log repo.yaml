name: OTA发布

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SuperTV repo
        uses: actions/checkout@v4

      # 读取 package.json 中的版本号
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 下载 SuperTV-${VERSION}.apk
      - name: Download release APK
        uses: robinraju/release-downloader@v1
        with:
          repository: ZangEdward/SuperTV
          tag: v${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fileName: "SuperTV-${{ env.VERSION }}.apk"

      # 克隆日志仓库
      - name: Clone log repo
        run: |
          git clone https://github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      # 更新 /log/vision/package.json
      - name: Update package.json in log/vision
        run: |
          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

      # 上传 APK 到 internal-cache-sync-daemon-log 的 Releases
      - name: Upload APK to log repo Releases
        uses: softprops/action-gh-release@v1
        with:
          repository: ZangEdward/internal-cache-sync-daemon-log
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      # 在根目录生成狗屁不通 log 文件
      - name: Generate absurd root log file
        run: |
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"

          RANDOM_CHARS=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 10000)

          {
            echo "Timestamp: ${TIMESTAMP}"
            echo "Sync Time: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "Version: ${VERSION}"
            echo ""
            echo "Entropy-Seed: $((RANDOM * RANDOM))"
            echo "Quantum-Residue: 0x$(openssl rand -hex 3)"
            echo ""
            echo "Payload:"
            echo "XJ29A0D9-UNDEFINED-BUFFER-REWRITE-CHANNEL-Ω"
            echo "proto-sync-shadow: enabled-but-not-really"
            echo "cache-drift-index: 0.$((RANDOM)) / fluctuating"
            echo "daemon-murmur: \"the packet walks sideways tonight\""
            echo ""
            echo "Random-Block:"
            echo "${RANDOM_CHARS}"
            echo ""
            echo "Footer:"
            echo "this-log-file-was-generated-by-a-daemon-that-denies-its-own-existence"
          } > sync-repo/${LOGFILE}

      # 提交并推送 package.json + log 文件
      - name: Commit & Push
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Sync v${VERSION} + update package.json + add log ${LOGFILE}" || true
          git push https://ZangEdward:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git
