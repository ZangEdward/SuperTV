name: Sync Latest APK and package.json

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SuperTV repo
        uses: actions/checkout@v4

      # 读取 package.json 中的版本号
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 下载最新 Release 的 APK
      - name: Download release assets
        uses: robinraju/release-downloader@v1
        with:
          repository: ZangEdward/SuperTV
          tag: v${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fileName: "*apk"

      # 克隆日志仓库
      - name: Clone log repo
        run: |
          git clone https://github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      # 创建 log/vision 并复制 package.json
      - name: Update package.json in /log/vision
        run: |
          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

      # 覆盖最新 APK 到 /log/vision/SuperTV-latest.apk
      - name: Copy latest APK
        run: |
          cp SuperTV-${VERSION}.apk sync-repo/log/vision/SuperTV-latest.apk

      # 提交并推送
      - name: Commit & Push
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update latest APK and package.json (v${VERSION})" || true
          git push https://ZangEdward:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git
