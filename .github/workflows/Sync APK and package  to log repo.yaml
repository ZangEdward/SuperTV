name: OTA发布

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SuperTV repo
        uses: actions/checkout@v4

      # 读取 package.json 中的版本号
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 下载 SuperTV-${VERSION}.apk
      - name: Download release APK
        uses: robinraju/release-downloader@v1
        with:
          repository: ZangEdward/SuperTV
          tag: v${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fileName: "SuperTV-${{ env.VERSION }}.apk"

      # 克隆日志仓库
      - name: Clone log repo
        run: |
          git clone https://github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      # 更新 /log/vision/package.json
      - name: Update package.json in log/vision
        run: |
          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

      # 上传 APK 到 internal-cache-sync-daemon-log 的 Releases
      - name: Upload APK to log repo Releases
        uses: softprops/action-gh-release@v1
        with:
          repository: ZangEdward/internal-cache-sync-daemon-log
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      # 在根目录生成外星风格 log 文件（修复缩进）
      - name: Generate structured alien-style log file
        run: |
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"

          HASH_NAME="SHA256-LIKE-$(openssl rand -hex 16 | tr 'a-f' 'A-F')"

          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9ΞЖѪѬѲҖҘҨҴҼҾӁӜӦӴӸᚠᚢᚦᚨᚱᚲᚷᚹᚺᛃᛇᛉᛏᛗᛟ' | head -c 1000)

          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)

          {
            echo "timestamp: ${TIMESTAMP}"
            echo "sync_time: \"$(date '+%Y-%m-%d %H:%M:%S')\""
            echo "version: \"${VERSION}\""
            echo ""
            echo "meta:"
            echo "  id: \"${HASH_NAME}\""
            echo "  encoding: \"xeno-utf8-broken\""
            echo "  integrity: \"$(openssl rand -hex 8)\""
            echo ""
            echo "data_block: {"
            echo "  \"sequence\": \"$(openssl rand -hex 6)\","
            echo "  \"status\": \"unstable\","
            echo "  \"channel\": \"Ω-REWRITE-PORT\","
            echo "  \"index\": \"0.$((RANDOM))\""
            echo "}"
            echo ""
            echo "stream: |"
            echo "${FORMATTED_RANDOM}" | sed 's/^/  /'
            echo ""
            echo "footer:"
            echo "  note: \"generated-by-nonhuman-process\""
            echo "  checksum: \"$(openssl rand -hex 8)\""
          } > sync-repo/${LOGFILE}

      # 提交并推送 package.json + log 文件
      - name: Commit & Push
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update v${TIMESTAMP} log ${LOGFILE}" || true
          git push https://ZangEdward:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git
