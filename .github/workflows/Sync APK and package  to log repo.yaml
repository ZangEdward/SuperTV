name: OTA发布 (异库同步)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout SuperTV repo
        uses: actions/checkout@v4

      - name: 🏷️ Read version
        id: read_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: ⬇️ Download release APK
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          tag: v${{ steps.read_version.outputs.version }}
          token: ${{ secrets.PAT }}
          fileName: "SuperTV-${{ steps.read_version.outputs.version }}.apk"

      - name: 📂 Clone log repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/${{ secrets.SYNC_REPO }}.git sync-repo

      - name: 📄 Update package.json in log/vision
        run: |
          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

      - name: 📏 Update apksize.json
        run: |
          mkdir -p sync-repo/log/vision
          rm -f sync-repo/log/vision/apksize.json
          APK_SIZE=$(stat -c%s "SuperTV-${VERSION}.apk")
          echo "{ \"apksize\": ${APK_SIZE} }" > sync-repo/log/vision/apksize.json
          echo "APK size: ${APK_SIZE} bytes"

      - name: 🚀 Upload APK to log repo Releases
        uses: softprops/action-gh-release@v1
        with:
          repository: ${{ secrets.SYNC_REPO }}
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: 🪵 Generate structured alien-style log file
        run: |
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"
          HASH_NAME="SHA256-LIKE-$(openssl rand -hex 16 | tr 'a-f' 'A-F')"
          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9ΞЖѪѬѲҖҘҨҴҼҾӁӜӦӴӸᚠᚢᚦᚨᚱᚲᚷᚹᚺᛃᛇᛉᛏᛗ' | head -c 1000)
          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)

          {
            echo "timestamp: ${TIMESTAMP}"
            echo "sync_time: \"$(date '+%Y-%m-%d %H:%M:%S')\""
            echo "version: \"${VERSION}\""
            echo ""
            echo "meta:"
            echo "  id: \"${HASH_NAME}\""
            echo "  encoding: \"xeno-utf8-broken\""
            echo "  integrity: \"$(openssl rand -hex 8)\""
            echo ""
            echo "data_block: {"
            echo "  \"sequence\": \"$(openssl rand -hex 6)\","
            echo "  \"status\": \"unstable\","
            echo "  \"channel\": \"Ω-REWRITE-PORT\","
            echo "  \"index\": \"0.$((RANDOM))\""
            echo "}"
            echo ""
            echo "stream: |"
            echo "${FORMATTED_RANDOM}" | sed 's/^/  /'
            echo ""
            echo "footer:"
            echo "  note: \"generated-by-nonhuman-process\""
            echo "  checksum: \"$(openssl rand -hex 8)\""
          } > sync-repo/${LOGFILE}
          
          echo "LOGFILE_NAME=${LOGFILE}" >> $GITHUB_ENV

      - name: 📤 Commit & Push
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update v${VERSION} + apksize.json + log ${LOGFILE_NAME}" || true
          git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ secrets.SYNC_REPO }}.git
