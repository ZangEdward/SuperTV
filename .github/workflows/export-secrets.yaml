name: 导出配置文件

on:
  workflow_dispatch:

jobs:
  create_config:
    runs-on: ubuntu-latest
    steps:
      - name: 生成配置文档
        run: |
          echo "=== SuperTV 账号配置信息 ===" > SuperTV_Config.txt
          echo "SIGNING_KEY: ${{ secrets.SIGNING_KEY }}" >> SuperTV_Config.txt
          echo "KEY_ALIAS: ${{ secrets.KEY_ALIAS }}" >> SuperTV_Config.txt
          echo "KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}" >> SuperTV_Config.txt
          echo "PAT: ${{ secrets.PAT }}" >> SuperTV_Config.txt
          echo "" >> SuperTV_Config.txt
          echo "导出时间: $(date)" >> SuperTV_Config.txt

      - name: 上传文件作为附件 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SuperTV_Credentials
          path: SuperTV_Config.txt
          retention-days: 1
