name: Build & OTA 发布 SuperTV

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: '请选择任务类型：仅构建APK(build-only) 或 构建+OTA(ota)'
        required: true
        default: 'ota'
        type: choice
        options:
          - build-only
          - ota

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_type == 'build-only' || github.event.inputs.job_type == 'ota' }}

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --network-timeout 100000

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      # -------------------------------
      # 🔥 ffmpeg-kit 修复补丁（关键步骤）
      # -------------------------------
      - name: Patch ffmpeg-kit missing version
        run: |
          echo "🔧 修复 ffmpeg-kit-react-native 6.0.1 错误依赖版本..."

          # 替换 app/build.gradle 中的错误版本 6.0-1 → 6.0
          sed -i 's/ffmpeg-kit-https:6.0-1/ffmpeg-kit-https:6.0/g' android/app/build.gradle || true

          # 替换 android/build.gradle 中的错误版本
          sed -i 's/ffmpeg-kit-https:6.0-1/ffmpeg-kit-https:6.0/g' android/build.gradle || true

          # 强制 Gradle 使用正确版本
          cat >> android/build.gradle << 'EOF'

subprojects { project ->
    project.configurations.all {
        resolutionStrategy {
            force "com.arthenica:ffmpeg-kit-https:6.0"
        }
    }
}
EOF

      - name: Decode Keystore
        run: |
          echo "$SIGNING_KEY" | base64 --decode > android/app/release-key.jks
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Configure Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --warning-mode all

      - name: Copy APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/SuperTV-${VERSION}.apk

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            output/SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact for OTA
        if: ${{ github.event.inputs.job_type == 'ota' }}
        uses: actions/upload-artifact@v4
        with:
          name: supertv-apk
          path: output/SuperTV-${{ env.VERSION }}.apk

  ota:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_type == 'ota' }}

    steps:
      - name: Checkout SuperTV repo
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download built APK artifact
        uses: actions/download-artifact@v4
        with:
          name: supertv-apk

      - name: Rename artifact APK
        run: |
          mv SuperTV-*.apk SuperTV-${VERSION}.apk || true

      - name: Clone log repo
        run: |
          git clone https://github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      - name: Update package.json in log/vision
        run: |
          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

      - name: Update apksize.json
        run: |
          mkdir -p sync-repo/log/vision
          rm -f sync-repo/log/vision/apksize.json
          APK_SIZE=$(stat -c%s "SuperTV-${VERSION}.apk")
          echo "{ \"apksize\": ${APK_SIZE} }" > sync-repo/log/vision/apksize.json
          echo "APK size: ${APK_SIZE} bytes"

      - name: Upload APK to log repo Releases
        uses: softprops/action-gh-release@v1
        with:
          repository: ZangEdward/internal-cache-sync-daemon-log
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Generate structured alien-style log file
        run: |
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"
          HASH_NAME="SHA256-LIKE-$(openssl rand -hex 16 | tr 'a-f' 'A-F')"
          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9ΞЖѪѬѲҖҘҨҴҼҾӁӜӦӴӸᚠᚢᚦᚨᚱᚲᚷᚹᚺᛃᛇᛉᛏᛗᛟ' | head -c 1000)
          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)
          {
            echo "timestamp: ${TIMESTAMP}"
            echo "hash: ${HASH_NAME}"
            echo ""
            echo "$FORMATTED_RANDOM"
          } > sync-repo/log/vision/${LOGFILE}

      - name: Commit & Push log repo
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "OTA update for version ${VERSION}"
          git push