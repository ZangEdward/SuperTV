name: Build and Deploy OTA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      job_type:
        description: '选择构建类型 (build-only 或 ota)'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota
          - build-only

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_NODES_JSON: ${{ secrets.API_NODES_JSON }}
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          yarn config set network-timeout 300000
          yarn install

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/release-key.jks

      - name: Configure Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Copy APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/SuperTV-${{ env.VERSION }}.apk

      # -------------------------------
      # 强更新：如果 SuperTV 仓库有同版本 Release，直接整单摧毁删除
      # -------------------------------
      - name: Force delete old Release if conflicts (SuperTV repo)
        run: |
          VERSION="${{ env.VERSION }}"
          REPO="ZangEdward/SuperTV"

          # 1. 获取已存在的 Release ID
          RELEASE_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.PAT }}" \
            https://api.github.com/repos/$REPO/releases/tags/v$VERSION \
            | jq -r '.id')

          # 2. 如果找到了，不仅删资源，直接彻底删除整个 Release 实体
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            echo "发现版本冲突！正在彻底删除原有的 SuperTV v$VERSION Release (ID: $RELEASE_ID)..."
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.PAT }}" \
              https://api.github.com/repos/$REPO/releases/$RELEASE_ID
          
            # 3. 同时强行删除对应的 Git Tag，确保留水线重新推 Tag 时不报错
            echo "正在清理远程 Tag: v$VERSION"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.PAT }}" \
              https://api.github.com/repos/$REPO/git/refs/tags/v$VERSION
          else
            echo "未发现冲突版本，准备进行全新创建。"
          fi

      - name: Create or update Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: output/SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Upload APK artifact (for OTA job)
        if: ${{ github.event_name == 'push' || github.event.inputs.job_type == 'ota' }}
        uses: actions/upload-artifact@v4
        with:
          name: supertv-apk
          path: output/SuperTV-${{ env.VERSION }}.apk

  ota:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.job_type == 'ota' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: supertv-apk

      - name: Set environment
        run: |
          VERSION="${{ needs.build.outputs.VERSION }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mv SuperTV-*.apk SuperTV-$VERSION.apk || true

      - name: Clone log repository
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      - name: Update metadata files
        run: |
          if [ -e "sync-repo/log" ] && [ ! -d "sync-repo/log" ]; then
            rm -f sync-repo/log
          fi
          if [ -e "sync-repo/log/vision" ] && [ ! -d "sync-repo/log/vision" ]; then
            rm -f sync-repo/log/vision
          fi

          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

          APK_SIZE=$(stat -c%s "SuperTV-${{ env.VERSION }}.apk")
          echo "{ \"apksize\": ${APK_SIZE} }" > sync-repo/log/vision/apksize.json

      # -------------------------------
      # 强更新：如果 OTA 仓库有同版本 Release，也同样执行全面摧毁
      # -------------------------------
      - name: Force delete old Release if conflicts (OTA repo)
        run: |
          VERSION="${{ env.VERSION }}"
          REPO="ZangEdward/internal-cache-sync-daemon-log"

          # 1. 获取现有 Release ID
          RELEASE_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.PAT }}" \
            https://api.github.com/repos/$REPO/releases/tags/v$VERSION \
            | jq -r '.id')

          # 2. 如果存在，直接毁灭整个 Release
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            echo "发现 OTA 仓库版本冲突！正在彻底删除原有 v$VERSION Release (ID: $RELEASE_ID)..."
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.PAT }}" \
              https://api.github.com/repos/$REPO/releases/$RELEASE_ID
          
            # 3. 强行把对应的远程 Git Tag 也清理掉
            echo "正在清理远程 OTA Tag: v$VERSION"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.PAT }}" \
              https://api.github.com/repos/$REPO/git/refs/tags/v$VERSION
          else
            echo "OTA 仓库未发现冲突版本，正常推进。"
          fi

      - name: Upload APK to log repo release
        uses: softprops/action-gh-release@v1
        with:
          repository: ZangEdward/internal-cache-sync-daemon-log
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Generate alien log
        run: |
          VERSION_ENV="${{ env.VERSION }}"
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"
          HASH_NAME="ID-$(openssl rand -hex 16)"
          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 1000)
          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)

          {
            echo "timestamp: ${TIMESTAMP}"
            echo "sync_time: \"$(date '+%Y-%m-%d %H:%M:%S')\""
            echo "version: \"${VERSION_ENV}\""
            echo ""
            echo "meta:"
            echo "  id: \"${HASH_NAME}\""
            echo "  encoding: \"ascii-safe\""
            echo "  integrity: \"$(openssl rand -hex 8)\""
            echo ""
            echo "data_block:"
            echo "  sequence: \"$(openssl rand -hex 6)\""
            echo "  status: \"ok\""
            echo "  channel: \"release\""
            echo "  index: \"0.$((RANDOM))\""
            echo ""
            echo "stream: |"
            echo "${FORMATTED_RANDOM}" | sed 's/^  //'
            echo ""
            echo "footer:"
            echo "  note: \"generated-by-ci\""
            echo "  checksum: \"$(openssl rand -hex 8)\""
          } > sync-repo/${LOGFILE}

      - name: Commit and push changes
        run: |
          cd sync-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update v${{ env.VERSION }} - Sync metadata to log/vision" || true
          
          git pull origin main --rebase || git pull origin master --rebase
          git push https://ZangEdward:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git