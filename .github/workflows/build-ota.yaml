name: Build and Deploy OTA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      job_type:
        description: '选择构建类型 (build-only 或 ota)'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota
          - build-only

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_NODES_JSON: ${{ secrets.API_NODES_JSON }}
      EXPO_PUBLIC_SYNC_REPO: ${{ secrets.SYNC_REPO }}
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          yarn config set network-timeout 300000
          yarn install

      - name: 🧹 Clear Metro cache
        run: rm -rf node_modules/.cache/metro

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/release-key.jks

      - name: Configure Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Copy APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/SuperTV-${{ env.VERSION }}.apk

      - name: Upload APK artifact (for OTA job)
        if: ${{ github.event_name == 'push' || github.event.inputs.job_type == 'ota' }}
        uses: actions/upload-artifact@v4
        with:
          name: supertv-apk
          path: output/SuperTV-${{ env.VERSION }}.apk

  ota:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.job_type == 'ota' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: supertv-apk

      - name: Set environment
        run: |
          VERSION="${{ needs.build.outputs.VERSION }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mv SuperTV-*.apk SuperTV-$VERSION.apk || true

      - name: Clone log repository
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/${{ secrets.SYNC_REPO }}.git sync-repo

      - name: Update metadata files
        run: |
          if [ -e "sync-repo/log" ] && [ ! -d "sync-repo/log" ]; then
            rm -f sync-repo/log
          fi
          if [ -e "sync-repo/log/vision" ] && [ ! -d "sync-repo/log/vision" ]; then
            rm -f sync-repo/log/vision
          fi

          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

          APK_SIZE=$(stat -c%s "SuperTV-${{ env.VERSION }}.apk")
          echo "{ \"apksize\": ${APK_SIZE} }" > sync-repo/log/vision/apksize.json

      # -------------------------------
      # 智能更新：仅删除冲突的同名文件（Asset），而不删除整个 Release
      # -------------------------------
      - name: Handle asset conflict (OTA repo)
        run: |
          VERSION="${{ env.VERSION }}"
          REPO="${{ secrets.SYNC_REPO }}"
          FILE_NAME="SuperTV-${{ env.VERSION }}.apk"

          # 1. 获取 Release 信息
          RELEASE_INFO=$(curl -s \
            -H "Authorization: token ${{ secrets.PAT }}" \
            https://api.github.com/repos/$REPO/releases/tags/v$VERSION)
          
          RELEASE_ID=$(echo $RELEASE_INFO | jq -r '.id')

          # 2. 如果 Release 存在，检查是否已存在同名资产
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            ASSET_ID=$(echo $RELEASE_INFO | jq -r ".assets[] | select(.name==\"$FILE_NAME\") | .id")

            # 3. 仅删除冲突的 Asset，保留整个 Release 和其他历史记录
            if [ -n "$ASSET_ID" ]; then
              echo "⚠️ 发现同名文件 $FILE_NAME 冲突！正在删除旧资产 (ID: $ASSET_ID)..."
              curl -X DELETE \
                -H "Authorization: token ${{ secrets.PAT }}" \
                https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID
            else
              echo "✅ 未发现同名资产，无需删除。"
            fi
          else
            echo "ℹ️ 版本 v$VERSION 的 Release 尚不存在，将由下一步自动创建。"
          fi

      - name: Upload APK to log repo release
        uses: softprops/action-gh-release@v1
        with:
          repository: ${{ secrets.SYNC_REPO }}
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Generate alien log
        run: |
          VERSION_ENV="${{ env.VERSION }}"
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"
          HASH_NAME="ID-$(openssl rand -hex 16)"
          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 1000)
          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)

          {
            echo "timestamp: ${TIMESTAMP}"
            echo "sync_time: \"$(date '+%Y-%m-%d %H:%M:%S')\""
            echo "version: \"${VERSION_ENV}\""
            echo ""
            echo "meta:"
            echo "  id: \"${HASH_NAME}\""
            echo "  encoding: \"ascii-safe\""
            echo "  integrity: \"$(openssl rand -hex 8)\""
            echo ""
            echo "data_block:"
            echo "  sequence: \"$(openssl rand -hex 6)\""
            echo "  status: \"ok\""
            echo "  channel: \"release\""
            echo "  index: \"0.$((RANDOM))\""
            echo ""
            echo "stream: |"
            echo "${FORMATTED_RANDOM}" | sed 's/^  //'
            echo ""
            echo "footer:"
            echo "  note: \"generated-by-ci\""
            echo "  checksum: \"$(openssl rand -hex 8)\""
          } > sync-repo/${LOGFILE}

      - name: Commit and push changes
        run: |
          cd sync-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update v${{ env.VERSION }} - Sync metadata to log/vision" || true
          
          git pull origin main --rebase || git pull origin master --rebase
          git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ secrets.SYNC_REPO }}.git
