name: Build & OTA 发布 SuperTV

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: "请选择任务类型：仅构建APK(build-only) 或 构建+OTA(ota)"
        required: true
        default: "ota"
        type: choice
        options:
          - build-only
          - ota

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_type == 'build-only' || github.event.inputs.job_type == 'ota' }}
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --network-timeout 100000

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Patch ffmpeg-kit dependency
        run: |
          echo "Patching ffmpeg-kit-react-native dependency version..."
          
          # 1. 强行将所有地方的依赖版本统一改为 6.0-2
          find node_modules/ffmpeg-kit-react-native/android/ -name "*.gradle" -exec sed -i 's/ffmpeg-kit-https:6.0-1/ffmpeg-kit-https:6.0-2/g' {} + || true
          find node_modules/ffmpeg-kit-react-native/android/ -name "*.gradle" -exec sed -i 's/ffmpeg-kit-https:6.0/ffmpeg-kit-https:6.0-2/g' {} + || true
          sed -i 's/ffmpeg-kit-https:6.0-1/ffmpeg-kit-https:6.0-2/g' android/app/build.gradle || true
          sed -i 's/ffmpeg-kit-https:6.0/ffmpeg-kit-https:6.0-2/g' android/app/build.gradle || true
          
          # 2. 绕过 settings.gradle，直接在全局根 build.gradle 最顶层强行插入最高优先级的中央仓库和 Jitpack 仓库
          # 这样即使 settings.gradle 开启了集中管理，根级别的 allprojects 依然能强制下发仓库源
          mv android/build.gradle android/build.gradle.bak
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  mavenCentral()
                  maven { url "https://www.jitpack.io" }
                  maven { url "https://oss.sonatype.org/content/repositories/snapshots" }
              }
          }
          EOF
          cat android/build.gradle.bak >> android/build.gradle
          
          # 3. 强行在全局解析策略中注入强制版本
          cat >> android/build.gradle << 'EOF'
          subprojects { project ->
              project.configurations.all {
                  resolutionStrategy {
                      force "com.arthenica:ffmpeg-kit-https:6.0-2"
                  }
              }
          }
          EOF

      - name: Decode Keystore
        run: |
          echo "$SIGNING_KEY" | base64 --decode > android/app/release-key.jks
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Configure Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --warning-mode all

      - name: Copy APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/SuperTV-${VERSION}.apk

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            output/SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact for OTA
        if: ${{ github.event.inputs.job_type == 'ota' }}
        uses: actions/upload-artifact@v4
        with:
          name: supertv-apk
          path: output/SuperTV-${{ env.VERSION }}.apk

  ota:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_type == 'ota' }}
    steps:
      - name: Checkout SuperTV repo
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download built APK artifact
        uses: actions/download-artifact@v4
        with:
          name: supertv-apk

      - name: Rename artifact APK
        run: |
          mv SuperTV-*.apk SuperTV-${VERSION}.apk || true

      - name: Clone log repo
        run: |
          git clone https://github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      - name: Update package.json in log/vision
        run: |
          mkdir -p sync-repo/log/vision
          cp package.json sync-repo/log/vision/package.json

      - name: Update apksize.json
        run: |
          mkdir -p sync-repo/log/vision
          rm -f sync-repo/log/vision/apksize.json
          APK_SIZE=$(stat -c%s "SuperTV-${VERSION}.apk")
          echo "{ \"apksize\": ${APK_SIZE} }" > sync-repo/log/vision/apksize.json

      - name: Upload APK to log repo Releases
        uses: softprops/action-gh-release@v1
        with:
          repository: ZangEdward/internal-cache-sync-daemon-log
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: |
            SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Generate structured alien-style log file
        run: |
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"
          HASH_NAME="ID-$(openssl rand -hex 16)"
          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 1000)
          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)
          
          {
            echo "timestamp: ${TIMESTAMP}"
            echo "sync_time: \"$(date '+%Y-%m-%d %H:%M:%S')\""
            echo "version: \"${VERSION}\""
            echo ""
            echo "meta:"
            echo "  id: \"${HASH_NAME}\""
            echo "  encoding: \"ascii-safe\""
            echo "  integrity: \"$(openssl rand -hex 8)\""
            echo ""
            echo "data_block:"
            echo "  sequence: \"$(openssl rand -hex 6)\""
            echo "  status: \"ok\""
            echo "  channel: \"release\""
            echo "  index: \"0.$((RANDOM))\""
            echo ""
            echo "stream: |"
            echo "${FORMATTED_RANDOM}" | sed 's/^/  /'
            echo ""
            echo "footer:"
            echo "  note: \"generated-by-ci\""
            echo "  checksum: \"$(openssl rand -hex 8)\""
          } > sync-repo/${LOGFILE}

      - name: Commit & Push
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update v${VERSION} + apksize.json + log ${LOGFILE}" || true
          git push https://ZangEdward:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git
