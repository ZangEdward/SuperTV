name: Build and Deploy OTA

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: '选择构建类型 (build-only 或 ota)'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota
          - build-only

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_type == 'build-only' || github.event.inputs.job_type == 'ota' }}
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          yarn config set network-timeout 300000
          yarn install
          yarn add crypto-js
          yarn add -D @types/crypto-js

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/release-key.jks

      - name: Configure Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Copy APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/SuperTV-${{ env.VERSION }}.apk

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: output/SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: ${{ github.event.inputs.job_type == 'ota' }}
        uses: actions/upload-artifact@v4
        with:
          name: supertv-apk
          path: output/SuperTV-${{ env.VERSION }}.apk

  ota:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.job_type == 'ota' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: supertv-apk

      - name: Set environment
        run: |
          VERSION="${{ needs.build.outputs.VERSION }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mv SuperTV-*.apk SuperTV-$VERSION.apk || true

      - name: Clone log repository
        run: |
          # 使用具有写权限的 PAT 克隆 log 目标仓库
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/ZangEdward/internal-cache-sync-daemon-log.git sync-repo

      - name: Update metadata files
        run: |
          # 1. 严格推送到要求的 log/log 目录结构下
          mkdir -p sync-repo/log/log
          cp package.json sync-repo/log/log/package.json
          
          # 2. 计算大小并生成 apksize.json
          APK_SIZE=$(stat -c%s "SuperTV-${{ env.VERSION }}.apk")
          echo "{ \"apksize\": ${APK_SIZE} }" > sync-repo/log/log/apksize.json

      - name: Upload APK to log repo release
        uses: softprops/action-gh-release@v2
        with:
          # 3. 将编译出的 APK 发布至目标 log 仓库的 Releases 
          repository: ZangEdward/internal-cache-sync-daemon-log
          tag_name: v${{ env.VERSION }}
          name: "SuperTV v${{ env.VERSION }}"
          files: SuperTV-${{ env.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Generate alien log
        run: |
          VERSION_ENV="${{ env.VERSION }}"
          TIMESTAMP=$(date +%s)
          LOGFILE="${TIMESTAMP}.log"
          HASH_NAME="ID-$(openssl rand -hex 16)"
          RAW_RANDOM=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 1000)
          FORMATTED_RANDOM=$(echo "$RAW_RANDOM" | fold -w 100)
          {
            echo "timestamp: ${TIMESTAMP}"
            echo "sync_time: \"$(date '+%Y-%m-%d %H:%M:%S')\""
            echo "version: \"${VERSION_ENV}\""
            echo ""
            echo "meta:"
            echo "  id: \"${HASH_NAME}\""
            echo "  encoding: \"ascii-safe\""
            echo "  integrity: \"$(openssl rand -hex 8)\""
            echo ""
            echo "data_block:"
            echo "  sequence: \"$(openssl rand -hex 6)\""
            echo "  status: \"ok\""
            echo "  channel: \"release\""
            echo "  index: \"0.$((RANDOM))\""
            echo ""
            echo "stream: |"
            echo "${FORMATTED_RANDOM}" | sed 's/^/  /'
            echo ""
            echo "footer:"
            echo "  note: \"generated-by-ci\""
            echo "  checksum: \"$(openssl rand -hex 8)\""
          } > sync-repo/${LOGFILE}

      - name: Commit and push changes
        run: |
          cd sync-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update v${{ env.VERSION }} - Sync metadata to log/log" || true
          
          # 安全推送至远程 main 分支，如果不存在则尝试 master
          git push origin main || git push origin master