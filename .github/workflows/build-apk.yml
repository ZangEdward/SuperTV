name: Build AndroidTV APK

on:
  workflow_dispatch: # 保持手动触发

# 全局环境变量配置
env:
  # 强制使用 Node.js 24 运行 Actions 插件，解决弃用告警
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 【关键】解决内存溢出：增加 Node.js 内存到 4GB
  NODE_OPTIONS: "--max-old-space-size=4096"
  # 增加 Java/Gradle 内存，确保编译不崩溃
  _JAVA_OPTIONS: "-Xmx4g"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

permissions:
  contents: write

jobs:
  direct_build:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Get version from package.json
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Prebuild TV App
        # 使用 npx 直接调用，兼容性更高
        run: npx expo prebuild --platform android --no-install

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > android/app/SuperTV.jks

      - name: Build TV APK with Signing
        run: |
          cd android
          chmod +x gradlew
          # 使用 --no-daemon 模式在 CI 环境中更稳定，且带上签名参数
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=SuperTV.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK file
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/SuperTV.${{ steps.package-version.outputs.version }}.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Release v${{ steps.package-version.outputs.version }}
          body: |
            ## SuperTV 自动编译版
            - 版本号: ${{ steps.package-version.outputs.version }}
            - 基于项目: OrionTV
            - 编译时间: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false
          files: artifacts/SuperTV.${{ steps.package-version.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
